<svg viewBox="0 0 1180 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b8def"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b95a7"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1524"/>
      <stop offset="100%" stop-color="#161d33"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2440"/>
      <stop offset="100%" stop-color="#161c33"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1180" height="900" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="40" y="46" fill="#e8ecf6" font-size="26" font-weight="700">commands-rtk MCP Architecture</text>
  <text x="40" y="70" fill="#7d8aa3" font-size="14">Request flow from MCP client to shell execution and back</text>

  <!-- MCP Client box -->
  <g filter="url(#softShadow)">
    <rect x="40" y="120" width="220" height="150" rx="14" fill="#1b2338" stroke="#3a4668" stroke-width="1.5"/>
  </g>
  <text x="150" y="152" text-anchor="middle" fill="#9fb4ff" font-size="15" font-weight="700">MCP Client</text>
  <text x="150" y="176" text-anchor="middle" fill="#c7cfe3" font-size="13">OpenCode</text>
  <text x="150" y="196" text-anchor="middle" fill="#c7cfe3" font-size="13">Claude</text>
  <text x="150" y="216" text-anchor="middle" fill="#c7cfe3" font-size="13">Cursor</text>
  <rect x="60" y="232" width="180" height="26" rx="6" fill="#111830" stroke="#2c3653"/>
  <text x="150" y="249" text-anchor="middle" fill="#7fd1a1" font-size="11" font-family="Consolas, Menlo, monospace">tools/call run_process</text>

  <!-- Outer commands-rtk MCP Server container -->
  <g filter="url(#softShadow)">
    <rect x="330" y="100" width="800" height="560" rx="18" fill="url(#serverGrad)" stroke="#3a4668" stroke-width="1.5" stroke-dasharray="0"/>
  </g>
  <text x="356" y="134" fill="#9fb4ff" font-size="16" font-weight="700">commands-rtk MCP Server</text>

  <!-- server.ts box -->
  <g filter="url(#softShadow)">
    <rect x="480" y="160" width="200" height="110" rx="12" fill="#212a49" stroke="#4a5a8a" stroke-width="1.5"/>
  </g>
  <text x="580" y="188" text-anchor="middle" fill="#e8ecf6" font-size="15" font-weight="700" font-family="Consolas, Menlo, monospace">server.ts</text>
  <line x1="500" y1="200" x2="660" y2="200" stroke="#3a4668"/>
  <text x="580" y="226" text-anchor="middle" fill="#c7cfe3" font-size="13">Zod</text>
  <text x="580" y="248" text-anchor="middle" fill="#7fd1a1" font-size="13" font-family="Consolas, Menlo, monospace">.parse()</text>

  <!-- Arrow: client -> server.ts -->
  <path d="M260,195 L480,205" fill="none" stroke="#5b8def" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="345" y="184" fill="#8b95a7" font-size="11">JSON-RPC · stdin</text>
  <text x="335" y="215" fill="#8b95a7" font-size="11" font-family="Consolas, Menlo, monospace">"ls -la"</text>

  <!-- executor.ts box -->
  <g filter="url(#softShadow)">
    <rect x="480" y="330" width="240" height="150" rx="12" fill="#212a49" stroke="#4a5a8a" stroke-width="1.5"/>
  </g>
  <text x="600" y="358" text-anchor="middle" fill="#e8ecf6" font-size="15" font-weight="700" font-family="Consolas, Menlo, monospace">executor.ts</text>
  <line x1="500" y1="370" x2="700" y2="370" stroke="#3a4668"/>
  <text x="600" y="394" text-anchor="middle" fill="#c7cfe3" font-size="12" font-family="Consolas, Menlo, monospace">spawn(</text>
  <text x="600" y="414" text-anchor="middle" fill="#c7cfe3" font-size="12" font-family="Consolas, Menlo, monospace">  "/bin/sh",</text>
  <text x="600" y="434" text-anchor="middle" fill="#c7cfe3" font-size="12" font-family="Consolas, Menlo, monospace">  ["rtk ls -la"]</text>
  <text x="600" y="454" text-anchor="middle" fill="#c7cfe3" font-size="12" font-family="Consolas, Menlo, monospace">)</text>

  <!-- Arrow: server.ts -> executor.ts -->
  <path d="M580,270 L600,330" fill="none" stroke="#5b8def" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- rtk CLI box (external, outside server container) -->
  <g filter="url(#softShadow)">
    <rect x="930" y="345" width="170" height="90" rx="12" fill="#1b2338" stroke="#3a4668" stroke-width="1.5"/>
  </g>
  <text x="1015" y="378" text-anchor="middle" fill="#e8ecf6" font-size="14" font-weight="700">rtk CLI</text>
  <text x="1015" y="400" text-anchor="middle" fill="#c7cfe3" font-size="12">filters output</text>

  <!-- Arrow: executor.ts -> rtk CLI -->
  <path d="M720,400 L930,390" fill="none" stroke="#5b8def" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- cache.ts and logger.ts boxes -->
  <g filter="url(#softShadow)">
    <rect x="380" y="520" width="180" height="66" rx="10" fill="#1e2842" stroke="#3f4e78" stroke-width="1.5"/>
  </g>
  <text x="470" y="546" text-anchor="middle" fill="#e8ecf6" font-size="13" font-weight="700" font-family="Consolas, Menlo, monospace">cache.ts</text>
  <text x="470" y="566" text-anchor="middle" fill="#7fd1a1" font-size="12" font-family="Consolas, Menlo, monospace">upsert</text>

  <g filter="url(#softShadow)">
    <rect x="600" y="520" width="180" height="66" rx="10" fill="#1e2842" stroke="#3f4e78" stroke-width="1.5"/>
  </g>
  <text x="690" y="546" text-anchor="middle" fill="#e8ecf6" font-size="13" font-weight="700" font-family="Consolas, Menlo, monospace">logger.ts</text>
  <text x="690" y="566" text-anchor="middle" fill="#7fd1a1" font-size="12" font-family="Consolas, Menlo, monospace">append</text>

  <!-- Arrows: executor.ts -> cache.ts / logger.ts -->
  <path d="M540,480 L480,520" fill="none" stroke="#8b95a7" stroke-width="1.8" marker-end="url(#arrowGray)"/>
  <path d="M640,480 L680,520" fill="none" stroke="#8b95a7" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- Return arrow: executor -> server.ts (response path), drawn as curve on right side of server.ts box -->
  <path d="M700,400 C 800,400 800,215 682,205" fill="none" stroke="#e0a458" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="760" y="300" fill="#e0a458" font-size="11">return</text>

  <!-- Arrow: server.ts -> client (JSON-RPC response) -->
  <path d="M480,240 L260,235" fill="none" stroke="#e0a458" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="270" fill="#e0a458" font-size="11">JSON-RPC response · stdout</text>

  <!-- State panel -->
  <g filter="url(#softShadow)">
    <rect x="380" y="620" width="700" height="120" rx="12" fill="#141b30" stroke="#2c3653" stroke-width="1.5"/>
  </g>
  <text x="404" y="650" fill="#9fb4ff" font-size="14" font-weight="700">State</text>
  <text x="404" y="672" fill="#8b95a7" font-size="12" font-family="Consolas, Menlo, monospace">~/.local/share/state/commands-rtk/</text>

  <text x="424" y="698" fill="#c7cfe3" font-size="13" font-family="Consolas, Menlo, monospace">├── command-cache.json</text>
  <text x="700" y="698" fill="#7d8aa3" font-size="12">SHA-256 keyed</text>

  <text x="424" y="722" fill="#c7cfe3" font-size="13" font-family="Consolas, Menlo, monospace">└── execution-log.jsonl</text>
  <text x="700" y="722" fill="#7d8aa3" font-size="12">append-only, rolls</text>

  <!-- Arrows: cache.ts / logger.ts -> state panel -->
  <path d="M470,586 L470,620" fill="none" stroke="#8b95a7" stroke-width="1.6" marker-end="url(#arrowGray)"/>
  <path d="M690,586 L690,620" fill="none" stroke="#8b95a7" stroke-width="1.6" marker-end="url(#arrowGray)"/>

  <!-- Legend -->
  <g transform="translate(40,790)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#5b8def" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="40" y="5" fill="#c7cfe3" font-size="12">request path</text>

    <line x1="180" y1="0" x2="210" y2="0" stroke="#e0a458" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
    <text x="220" y="5" fill="#c7cfe3" font-size="12">response path</text>

    <line x1="370" y1="0" x2="400" y2="0" stroke="#8b95a7" stroke-width="1.8" marker-end="url(#arrowGray)"/>
    <text x="410" y="5" fill="#c7cfe3" font-size="12">side-effect writes</text>
  </g>

  <text x="40" y="860" fill="#4d5877" font-size="11">Generated from ASCII architecture diagram</text>
</svg>
