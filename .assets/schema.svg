<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="100%" height="100%" style="background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.05"/>
    </filter>
  </defs>

  <rect x="320" y="40" width="540" height="430" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4" />
  <text x="340" y="70" font-size="16" font-weight="600" fill="#475569">commands-rtk MCP Server</text>

  <rect x="40" y="100" width="160" height="340" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" />
  <text x="120" y="140" font-size="16" font-weight="700" fill="#1e293b" text-anchor="middle">MCP Client</text>
  <text x="120" y="165" font-size="14" fill="#475569" text-anchor="middle">(OpenCode,</text>
  <text x="120" y="185" font-size="14" fill="#475569" text-anchor="middle">Claude,</text>
  <text x="120" y="205" font-size="14" fill="#475569" text-anchor="middle">Cursor)</text>

  <rect x="420" y="90" width="160" height="70" rx="6" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)" />
  <text x="500" y="115" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">server.ts</text>
  <text x="500" y="140" font-size="14" font-family="ui-monospace, monospace" fill="#6366f1" text-anchor="middle">Zod .parse()</text>

  <rect x="400" y="210" width="200" height="85" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="2" filter="url(#shadow)" />
  <text x="500" y="235" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">executor.ts</text>
  <text x="430" y="260" font-size="13" font-family="ui-monospace, monospace" fill="#059669">spawn("/bin/sh",</text>
  <text x="450" y="280" font-size="13" font-family="ui-monospace, monospace" fill="#059669">["rtk ls -la"])</text>

  <text x="680" y="250" font-size="14" font-weight="600" fill="#475569">rtk CLI</text>
  <text x="680" y="270" font-size="13" fill="#64748b">filters output</text>

  <text x="530" y="340" font-size="14" font-family="ui-monospace, monospace" fill="#475569">├── cache.ts ── <tspan fill="#d97706">upsert</tspan></text>
  <text x="530" y="365" font-size="14" font-family="ui-monospace, monospace" fill="#475569">├── logger.ts ── <tspan fill="#d97706">append</tspan></text>

  <rect x="420" y="400" width="160" height="50" rx="6" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)" />
  <text x="500" y="420" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">server.ts</text>
  <text x="500" y="440" font-size="14" font-family="ui-monospace, monospace" fill="#6366f1" text-anchor="middle">return</text>


  <path d="M 200 125 L 405 125" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <text x="305" y="105" font-size="13" fill="#475569" text-anchor="middle" font-weight="600">JSON-RPC stdin</text>
  <text x="305" y="145" font-size="12" fill="#0f172a" text-anchor="middle" font-family="ui-monospace, monospace">tools/call run_process</text>
  <text x="305" y="165" font-size="12" fill="#0f172a" text-anchor="middle" font-family="ui-monospace, monospace">"ls -la"</text>

  <path d="M 500 160 L 500 195" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <path d="M 600 255 L 665 255" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />

  <path d="M 500 295 L 500 385" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <path d="M 500 335 L 520 335" stroke="#64748b" stroke-width="2" fill="none" />
  <path d="M 500 360 L 520 360" stroke="#64748b" stroke-width="2" fill="none" />

  <path d="M 420 425 L 215 425" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <text x="315" y="415" font-size="13" fill="#475569" text-anchor="middle" font-weight="600">JSON-RPC response</text>
  <text x="315" y="445" font-size="12" fill="#0f172a" text-anchor="middle" font-family="ui-monospace, monospace">stdout</text>


  <rect x="40" y="520" width="820" height="100" rx="8" fill="#1e293b" />
  <text x="60" y="545" font-size="15" font-family="ui-monospace, monospace" font-weight="600" fill="#38bdf8">State: ~/.local/share/state/commands-rtk/</text>
  
  <text x="60" y="575" font-size="14" font-family="ui-monospace, monospace" fill="#94a3b8">├── <tspan fill="#e2e8f0">command-cache.json</tspan>   (SHA-256 keyed)</text>
  <text x="60" y="600" font-size="14" font-family="ui-monospace, monospace" fill="#94a3b8">└── <tspan fill="#e2e8f0">execution-log.jsonl</tspan>  (append-only, rolls)</text>

</svg>
