# Execution settings for commands-rtk v0.2.0
# The server wraps ALL commands with `rtk` for token minimization
# unless `use_raw: true` is passed. Per-command wrapper config is
# vestigial from v0.1.0 — v0.2.0 uses uniform RTK prefix.

[execution]
timeout_ms = 60000
max_buffer_mb = 10
max_log_entries = 1000
debounce_ms = 2000
